<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC — Invito di Matrimonio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage:        #a8bcab;
      --sage-dark:   #8fa992;
      --bronze:      #b08a6e;
      --bronze-dark: #8a6650;
      --bronze-light:#c9a882;
      --cream:       #f5f0e8;
      --ink:         #3a3028;
      --fold:        rgba(0,0,0,.13);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ─── HINT ─────────────────────────────────────────────── */
    .hint {
      position: fixed; bottom: 2.2rem;
      font-family: 'Cinzel', serif; font-size: .72rem;
      letter-spacing: .22em; color: rgba(0,0,0,.35);
      text-transform: uppercase;
      animation: breathe 3s ease-in-out infinite;
      pointer-events: none; z-index: 5; transition: opacity .5s;
    }
    .hint.hide { opacity: 0; }
    @keyframes breathe {
      0%,100% { opacity:.35; transform:translateY(0); }
      50%      { opacity:.65; transform:translateY(-4px); }
    }

    /* ─── ENVELOPE WRAPPER ─────────────────────────────────── */
    .envelope-wrap {
      position: relative;
      width: min(380px, 90vw);
      aspect-ratio: 1 / 1.32;
      cursor: pointer;
      perspective: 1200px;
    }
    .envelope-wrap:not(.opened) {
      animation: floatIn 1.2s cubic-bezier(.16,1,.3,1) both,
                 float 5s ease-in-out 1.3s infinite;
    }
    @keyframes floatIn {
      from { opacity:0; transform:translateY(40px) scale(.94); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    @keyframes float {
      0%,100% { transform:translateY(0); }
      50%      { transform:translateY(-10px); }
    }

/* ─── BASE RECTANGLE ────────────────────────────────────── */
    .env-base {
      position: absolute; inset: 0;
      background: 
        var(--sage) url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E") center/200px 200px no-repeat;
      border-radius: 4px;
      box-shadow:
        0 30px 80px rgba(0,0,0,.18),
        0  6px 20px rgba(0,0,0,.12);
      z-index: 1;
    }
    .env-base::after {
      display: none;
    }

    /* ─── SHARED TRIANGLE ─────────────────────────────────── */
    .tri {
      position: absolute; inset: 0;
      pointer-events: none;
    }
    .tri::before {
      content: '';
      position: absolute; inset: 0;
      background: 
        var(--sage) url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E") center/200px 200px no-repeat;
      box-shadow: inset 0 0 25px rgba(0,0,0,0.1);
      mix-blend-mode: multiply;
      filter: drop-shadow(-1px 0 0 rgba(0,0,0,0.15)) drop-shadow(1px 0 0 rgba(0,0,0,0.15)) drop-shadow(0 -1px 0 rgba(0,0,0,0.15)) drop-shadow(0 1px 0 rgba(0,0,0,0.15));
    }
    .tri::after {
      display: none;
    }

    /*
     * Z-INDEX MAP (stato CHIUSO)
     *  z:8  tri-top  (sopra tutto)
     *  z:7  tri-bottom / tri-left / tri-right
     *  z:5  letter
     *
     * Z-INDEX MAP (stato APERTO)
     *  z:7  tri-bottom / tri-left / tri-right
     *  z:5  letter
     *  z:3  tri-top
     *
     * All triangles use the same --sage color.
     * Fold lines are drawn by a separate SVG overlay.
     */

    /* ─── TOP FLAP ─────────────────────────────────────────── */
    .tri-top {
      z-index: 8;
      transform-origin: top center;
      transition: transform 1.2s cubic-bezier(.4,0,.2,1);
    }
    .tri-top::before {
      background: var(--sage);
      clip-path: polygon(0% 0%, 100% 0%, 50% 50%);
    }
    .envelope-wrap.opened .tri-top { 
      transform: rotateX(180deg); 
      z-index: 15;
    }

/* ─── BOTTOM ────────────────────────────────────────────── */
    .tri-bottom { z-index: 20; }
    .tri-bottom::before {
      background: var(--sage);
      clip-path: polygon(0% 100%, 100% 100%, 50% 50%);
      filter: drop-shadow(0 1px 0.5px rgba(0,0,0,0.18));
    }

    /* ─── LEFT ──────────────────────────────────────────────── */
    .tri-left { z-index: 300; }
    .tri-left::before {
      background: var(--sage);
      clip-path: polygon(0% 0%, 0% 100%, 50% 50%);
      filter: drop-shadow(1px 0 0.5px rgba(0,0,0,0.18));
    }

    /* ─── RIGHT ─────────────────────────────────────────────── */
    .tri-right { z-index: 20; }
    .tri-right::before {
      background: var(--sage);
      clip-path: polygon(100% 0%, 100% 100%, 50% 50%);
      filter: drop-shadow(-1px 0 0.5px rgba(0,0,0,0.18));
    }

    /* ─── LEFT ──────────────────────────────────────────────── */
    .tri-left { z-index: 20; }
    .tri-left::before {
      background: var(--sage);
      clip-path: polygon(0% 0%, 0% 100%, 50% 50%);
    }

    /* ─── RIGHT ─────────────────────────────────────────────── */
    .tri-right { z-index: 20; }
    .tri-right::before {
      background: var(--sage);
      clip-path: polygon(100% 0%, 100% 100%, 50% 50%);
    }
    .tri-bottom::before {
      background: var(--sage);
      clip-path: polygon(0% 100%, 100% 100%, 50% 50%);
    }

    /* ─── LEFT ──────────────────────────────────────────────── */
    .tri-left { 
      z-index: 20;
      border-left: 1px solid rgba(0,0,0,0.08);
      border-right: 1px solid rgba(0,0,0,0.08);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .tri-left::before {
      background: var(--sage);
      clip-path: polygon(0% 0%, 0% 100%, 50% 50%);
    }

    /* ─── RIGHT ─────────────────────────────────────────────── */
    .tri-right { 
      z-index: 20;
      border-left: 1px solid rgba(0,0,0,0.08);
      border-right: 1px solid rgba(0,0,0,0.08);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .tri-right::before {
      background: var(--sage);
      clip-path: polygon(100% 0%, 100% 100%, 50% 50%);
    }

    /* ─── FOLD LINES SVG OVERLAY ────────────────────────────── */
    /* Drawn on top of all triangles so lines are always visible */
    .env-folds {
      position: absolute; inset: 0;
      z-index: 20;
      pointer-events: none;
    }

    /* Hide fold lines on the flap area when it's flipped open */
    .envelope-wrap.opened .env-folds .fold-top { opacity: 0; transition: opacity .2s; }

    /* ─── LETTER ───────────────────────────────────────────── */
    .letter {
      position: absolute;
      left: 8%; right: 8%;
      top: 15%;
      height: 68%;
      background: var(--cream);
      border-radius: 2px;
      box-shadow: 0 4px 28px rgba(0,0,0,.22);
      visibility: hidden;
      transform: translateY(0);
      transition: transform .95s cubic-bezier(.16,1,.3,1) 1.4s,
                  visibility 0s linear 0s;
      z-index: 8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .letter-label {
      font-family: 'Cinzel', serif; font-size: .68rem;
      letter-spacing: .25em; color: var(--bronze-dark);
      text-transform: uppercase; opacity: 0;
      transition: opacity .4s .7s;
    }
    .envelope-wrap.opened .letter {
      visibility: visible;
      transform: translateY(-60%);
      z-index: 14;
    }
    .envelope-wrap.opened .letter-label { opacity: 1; }

    /* ─── SEAL ─────────────────────────────────────────────── */
    .seal {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%) scale(1);
      width: 88px; height: 88px; z-index: 20;
      transition: transform .6s cubic-bezier(.34,1.56,.64,1), opacity .4s;
    }
    .envelope-wrap.opened .seal {
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
    }
    .seal img { width:100%; height:100%; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,.35)); }
    .envelope-wrap:not(.opened) .seal:hover {
      transform: translate(-50%, -50%) scale(1.08);
    }

    /* ─── PDF MODAL ─────────────────────────────────────────── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(50,60,50,.85);
      backdrop-filter: blur(6px); z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .5s;
    }
    .modal-bg.visible { opacity:1; pointer-events:all; }

    .modal-inner {
      position: relative;
      width: min(720px, 94vw); height: min(900px, 88vh);
      background: var(--cream); border-radius: 3px;
      box-shadow: 0 40px 100px rgba(0,0,0,.5); overflow: hidden;
      transform: translateY(30px) scale(.97);
      transition: transform .5s cubic-bezier(.16,1,.3,1);
      display: flex; flex-direction: column;
    }
    .modal-bg.visible .modal-inner { transform: translateY(0) scale(1); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .9rem 1.4rem;
      border-bottom: 1px solid rgba(160,140,110,.2); background: var(--cream);
      flex-shrink: 0;
    }
    .modal-title {
      font-family: 'Cinzel', serif; font-size: .75rem;
      letter-spacing: .2em; color: var(--bronze-dark); text-transform: uppercase;
    }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-family: 'Cormorant Garamond', serif; font-size: 1.6rem;
      color: var(--bronze); line-height: 1; padding: 0 .2rem;
      transition: transform .2s, color .2s;
    }
    .modal-close:hover { transform: rotate(90deg); color: var(--bronze-dark); }
  </style>
</head>
<body>

  <div class="envelope-wrap" id="envelopeWrap" onclick="openEnvelope()">

    <!-- z:1 Background -->
    <div class="env-base"></div>

    <!-- z:2 Top flap (UNDER letter) -->
    <div class="tri tri-top"></div>

    <!-- z:4 Letter -->
    <div class="letter">
      <span class="letter-label">Apri l'invito</span>
    </div>

    <!-- z:6 Bottom / Left / Right (OVER letter) -->
    <div class="tri tri-bottom"></div>
    <div class="tri tri-left"></div>
    <div class="tri tri-right"></div>

    <!-- z:7 Fold lines SVG — drawn over all triangles -->
    <svg class="env-folds" viewBox="0 0 100 132" preserveAspectRatio="none"
         xmlns="http://www.w3.org/2000/svg">
      <!-- diagonal from top-left to centre -->
      <line class="fold-top" x1="0" y1="0"   x2="50" y2="66" stroke="rgba(0,0,0,.12)" stroke-width=".4"/>
      <!-- diagonal from top-right to centre -->
      <line class="fold-top" x1="100" y1="0" x2="50" y2="66" stroke="rgba(0,0,0,.12)" stroke-width=".4"/>
      <!-- diagonal from bottom-left to centre -->
      <line x1="0"   y1="132" x2="50" y2="66" stroke="rgba(0,0,0,.10)" stroke-width=".4"/>
      <!-- diagonal from bottom-right to centre -->
      <line x1="100" y1="132" x2="50" y2="66" stroke="rgba(0,0,0,.10)" stroke-width=".4"/>
    </svg>

    <!-- z:20 Wax seal -->
    <div class="seal">
      <img src="seal.png" alt="MC" />
    </div>

  </div>

  <p class="hint" id="hint">Clicca per aprire</p>

  <!-- PDF Modal -->
  <div class="modal-bg" id="modalBg">
    <div class="modal-inner">
      <div class="modal-header">
        <span class="modal-title">Invito di Matrimonio</span>
        <button class="modal-close" onclick="closeModal()" aria-label="Chiudi">×</button>
      </div>
      <div id="pdfContainer" style="flex:1; overflow-y:auto; overflow-x:hidden; background:#e8e4dc; display:flex; flex-direction:column; align-items:center; gap:8px; padding:8px 0;"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let opened = false;
    let pdfRendered = false;

    function openEnvelope() {
      if (opened) return;
      opened = true;
      document.getElementById('envelopeWrap').classList.add('opened');
      document.getElementById('hint').classList.add('hide');
      setTimeout(showModal, 2600);
    }

    function showModal() {
      document.getElementById('modalBg').classList.add('visible');
      if (!pdfRendered) { renderPDF(); pdfRendered = true; }
    }

    function closeModal() {
      document.getElementById('modalBg').classList.remove('visible');
    }

    async function renderPDF() {
      const container = document.getElementById('pdfContainer');
      const pdf = await pdfjsLib.getDocument('invito.pdf').promise;
      const dpr = window.devicePixelRatio || 1;

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const containerWidth = container.clientWidth || window.innerWidth;
        const viewport = page.getViewport({ scale: 1 });
        const scale = (containerWidth / viewport.width) * dpr;
        const scaledViewport = page.getViewport({ scale });

        const canvas = document.createElement('canvas');
        canvas.width  = scaledViewport.width;
        canvas.height = scaledViewport.height;
        canvas.style.width  = containerWidth + 'px';
        canvas.style.height = (scaledViewport.height / dpr) + 'px';
        canvas.style.display = 'block';
        container.appendChild(canvas);

        await page.render({
          canvasContext: canvas.getContext('2d'),
          viewport: scaledViewport
        }).promise;
      }
    }

    document.getElementById('modalBg').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
